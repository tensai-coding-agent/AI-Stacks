version: '3.8'

services:
  # PostgreSQL for applications requiring relational data
  postgres:
    image: postgres:16-alpine
    container_name: ai-stacks-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aistacks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aistacks_dev}
      POSTGRES_DB: ${POSTGRES_DB:-aistacks}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aistacks}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for caching and message queues
  redis:
    image: redis:7-alpine
    container_name: ai-stacks-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO for object storage (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: ai-stacks-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Qdrant for vector database (AI/ML embeddings)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-stacks-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
  qdrant_data:

