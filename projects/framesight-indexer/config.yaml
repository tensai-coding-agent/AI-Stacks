    entrypoint_v060: "0x5FF137D4b0FDCD49DcA30c7CF57E578a026d2789"
    entrypoint_v070: "0x0000000071727De22E5E9d8BAf0edAc6f37da032"
    start_block: 41386998

  - chain_id: 10
